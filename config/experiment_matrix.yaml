# ===== STAGE 2: Consensus Mechanism Isolation (2026-03-01) =====
# Purpose: Disentangle topology effect from consensus mechanism effect.
# The key confound: best_of_n uses judge_based consensus. Is its advantage
# due to the topology (selection) or the consensus mechanism (judge picks)?
# These blocks test synthesis topologies WITH judge_based consensus
# and best_of_n WITHOUT judge_based consensus.

- id: stage2b_flat_judge
  description: "Stage 2B - Flat topology with judge_based consensus (isolation test)"
  task_types:
  - analytical
  - creative
  agent_counts:
  - 3
  topologies:
  - flat
  consensus:
  - judge_based
  disagreement_levels:
  - 3
  models:
  - heterogeneous_strong_cross_provider
  repetitions: 4

