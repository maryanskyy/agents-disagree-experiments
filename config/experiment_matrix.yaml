# ===== STAGE 2D: Synthesis Consensus (2026-03-01) =====
# Purpose: Test whether LLM synthesis (merging all outputs into a new response)
# breaks the Selection Ceiling — producing outputs BETTER than any individual.
# This is the key experiment: if synthesis > judge selection, that proves
# multi-agent collaboration has genuine value beyond sampling.

- id: stage2d_flat_synthesis
  description: "Stage 2D - Flat topology with synthesis consensus (ceiling breaker)"
